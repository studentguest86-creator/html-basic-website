<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="contact16.css">
</head>
<body>
    <div class="contact">
        
      <div class="row">
            <div class="col1">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3650.5582437942085!2d90.35046371102297!3d23.798740278548312!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755c0e855555543%3A0xa2ece28ec447e096!2sDewan%20ICT%20Institute!5e0!3m2!1sen!2sbd!4v1781678449634!5m2!1sen!2sbd" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="col2">
                <h1 style="margin: 10px 0px;">Send Us A Email</h1>
                <form action="">

                    <label for="">Full Name</label> <br>
                    <input type="text" name="" id="" placeholder="Enter your name"> <br>

                    <label for="">Email Address</label> <br>
                    <input type="email" name="" id="" placeholder="Enter your email"> <br>

                    <label for="">Mobile</label> <br>
                    <input type="phone" name="" id=""placeholder="Enter your mobile"> <br>

                    <label for="">date of birth</label> <br>
                    <input type="date" name="" id="" placeholder="Enter your name">  <br>

                    <label for="">Message</label> <br>
                    <textarea name="" id=""  placeholder="write your message" cols="30" rows="10"></textarea> <br>

                    <label for="">Give CV</label> <br>
                    <input type="file" name="" id=""> <br>
                    
                    <label for="">Select your gender</label><br>
                    <input class="m" type="radio" id="male" name="gender">
                    <label for="male">male</label>
                    <input class="m" type="radio" id="female" name="gender">
                    <label for="female">female</label>


                    <label for="">Choose your code</label><br>
                    <input type="checkbox" id="vehicle1" name="vehicle1" value="html">
                    <label for="vehicle1"> html</label><br>
                    <input type="checkbox" id="vehicle2" name="vehicle2" value="css">
                    <label for="vehicle2">css</label><br>
                    <input type="checkbox" id="vehicle3" name="vehicle3" value="javascript">
                    <label for="vehicle3"> javascript</label><br><br>

                    <button>Submit</button>
                </form>
            </div>
      </div>
    </div>
</body>
</html>
