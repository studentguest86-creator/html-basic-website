    <script>

        // linear search algorithm
        function linear(arr,tar) {
            for (let i = 0; i < arr.length; i++) {
                if(arr[i] === tar) {
                    return i;
                }
            }
        }
        const da = [1,23,34,435,54,546]
        console.log(linear(da,54))


        function linear1(arr,tar) {
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === tar) {
                    return i;
                }
            }
        }
        const data = [1,2,3,4,5,6,7]
        console.log(linear(data,1))



        //binary search

        function binary(arr, target){
            let start = 0
            let end = arr.length -1

            while (start <= end) {
                let mid = Math.floor((start+end)/2)

                if(arr[mid] === target) {
                    return mid;
                }
                else if(arr[mid] < target){
                    start = mid +1
                } else {
                    end = mid -1
                }
            }
            return -1
        }

        const data2 = [1,2,3,4,5,6]
        console.log(binary(data2,3))


        //jump 
        function jump(arr,target) {
            let n = arr.length
            let step = Math.floor(Math.sqrt(n))
            let prev = 0

            while (arr[Math.min(step,n)-1] < target) {
                prev = step
                step += Math.floor(Math.sqrt(n))
                if(prev >=n) return -1
            }

            while (arr[prev] < target) {
                prev++
                if(prev === Math.min(step, n)) return -1
            }

            if(arr[prev] === target) return prev

            return -1
        }

        const data3 = [5, 10, 15, 20, 25, 30, 35, 40, 45];
        console.log(jump(data3,10))



        // interpolation
        function interpolation(arr, target) {
            let start = 0
            let end = arr.length - 1

            while (start <= end && target>= arr[start] && target <= arr[end]) {
                let pos = start + Math.floor(((target-arr[start]) * (end - start )) / (arr[end] - arr[start]))

                if (arr[pos] === target) {
                    return pos 
                } if(arr[pos] < target) {
                    start = pos + 1
                } else {
                    end = pos -1
                }
            }
            return -1
        }

        const data4 = [5, 10, 15, 20, 25, 30, 35, 40, 45];
        console.log(interpolation(data4,45))
